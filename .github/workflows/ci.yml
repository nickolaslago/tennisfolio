name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "11.13.0"
  UV_VERSION: "0.8.17"

jobs:
  api:
    name: api (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: pytest
        run: uv run pytest

  web:
    name: web (eslint + tsc build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: eslint
        run: pnpm --filter @tennisfolio/web lint

      - name: build (tsc -b && vite build)
        run: pnpm --filter @tennisfolio/web build

  core:
    name: core (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: vitest
        run: pnpm --filter @tennisfolio/core test

      - name: typecheck
        run: pnpm --filter @tennisfolio/core typecheck

  e2e:
    name: e2e smoke (docker compose)
    runs-on: ubuntu-latest
    needs: [api, web, core]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm --filter @tennisfolio/e2e exec playwright install --with-deps chromium

      - name: Build and start the Docker Compose stack
        run: docker compose up --build --wait
        env:
          COMPOSE_BAKE: "true"

      - name: Run Playwright smoke suite
        run: pnpm --filter @tennisfolio/e2e test
        env:
          E2E_BASE_URL: http://localhost:3000

      - name: Docker Compose logs
        if: always()
        run: docker compose logs

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Stop the Docker Compose stack
        if: always()
        run: docker compose down -v
