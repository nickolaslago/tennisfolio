services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tennisfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tennisfolio}
      POSTGRES_DB: ${POSTGRES_DB:-tennisfolio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tennisfolio} -d ${POSTGRES_DB:-tennisfolio}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TENNISFOLIO_DATABASE_URL: ${TENNISFOLIO_DATABASE_URL:-postgresql+psycopg://tennisfolio:tennisfolio@db:5432/tennisfolio}
    ports:
      - "${API_PORT:-8000}:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  pgdata:
